# freshdata education (Ed-Fi) domain pack — validation rules.
#
# Interpreted by EducationValidator (validator.py); field names are canonical and
# mapped onto real columns. Layers run schema -> format -> reference -> business ->
# semantic. Repairs are flag_only — student/staff identifiers and assessment scores
# are never imputed or altered.
#
# ED-015 ("staff_unique_id is an ID column — never repair") is enforced structurally
# via the validator's id_fields, not as a row-level rule.

domain: education
version: "0.1.0"
schema_version: "ed-fi-2024"

rules:
  - id: ED-001
    name: student_unique_id present and non-null
    layer: schema
    severity: error
    field: student_unique_id
    check: not_null
    repair: none

  - id: ED-002
    name: school_id and school_year present and non-null
    layer: schema
    severity: error
    fields: [school_id, school_year]
    check: not_null
    repair: none

  - id: ED-003
    name: school_year is a 4-digit ending year (1900..current+2)
    layer: format
    severity: error
    field: school_year
    check: custom
    params:
      func: school_year_valid
    repair: flag_only

  - id: ED-004
    name: grade_level is a valid Ed-Fi GradeLevelDescriptor
    layer: reference
    severity: error
    field: grade_level
    check: reference
    params:
      reference: grade_levels
      case_insensitive: true
    repair: flag_only

  - id: ED-005
    name: enrollment_date is ISO 8601 (YYYY-MM-DD)
    layer: format
    severity: error
    field: enrollment_date
    check: custom
    params:
      func: iso8601_date
    repair: flag_only

  - id: ED-006
    name: exit_withdrawal_date is ISO 8601 (YYYY-MM-DD)
    layer: format
    severity: error
    field: exit_withdrawal_date
    check: custom
    params:
      func: iso8601_date
    repair: flag_only

  - id: ED-007
    name: exit_withdrawal_date is on or after enrollment_date
    layer: business
    severity: error
    fields: [exit_withdrawal_date, enrollment_date]
    check: custom
    params:
      func: ge_date
    repair: flag_only

  - id: ED-008
    name: enrollment_date falls within the implied school-year window
    layer: business
    severity: warning
    fields: [enrollment_date, school_year]
    check: custom
    params:
      func: enrollment_in_year
    repair: flag_only

  - id: ED-009
    name: exit_withdrawal_type is a valid Ed-Fi ExitWithdrawalDescriptor
    layer: reference
    severity: error
    field: exit_withdrawal_type
    check: reference
    params:
      reference: exit_withdrawal_codes
      case_insensitive: true
    repair: flag_only

  - id: ED-010
    name: exit_withdrawal_type present whenever exit_withdrawal_date is present
    layer: business
    severity: error
    field: exit_withdrawal_date
    check: custom
    params:
      func: requires_field
      requires: exit_withdrawal_type
    repair: flag_only

  - id: ED-011
    name: assessment_title and assessment_score are present together
    layer: schema
    severity: error
    fields: [assessment_title, assessment_score]
    check: custom
    params:
      func: both_present
    repair: flag_only

  - id: ED-012
    name: assessment_score is numeric
    layer: format
    severity: error
    field: assessment_score
    check: custom
    params:
      func: numeric
    repair: flag_only

  - id: ED-013
    name: assessment_score_type is a recognized score type
    layer: reference
    severity: warning
    field: assessment_score_type
    check: reference
    params:
      reference: assessment_categories
      case_insensitive: true
    repair: flag_only

  - id: ED-014
    name: assessment_score is non-negative
    layer: semantic
    severity: warning
    field: assessment_score
    check: custom
    params:
      func: nonneg_numeric
    repair: flag_only

  - id: ED-016
    name: staff_classification is a valid Ed-Fi StaffClassificationDescriptor
    layer: reference
    severity: error
    field: staff_classification
    check: enum
    params:
      case_insensitive: true
      values:
        - Librarians/Media specialists
        - Paraprofessionals/Instructional assistants
        - Student support services staff
        - Administrative support staff
        - Principals/Assistant principals
        - School administrators
        - LEA administrators
        - Instructional coordinators
        - Teachers
    repair: flag_only
