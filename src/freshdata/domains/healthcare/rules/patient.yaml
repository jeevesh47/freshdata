# freshdata healthcare pack — FHIR Patient resource rules.
#
# Interpreted by HealthcareValidator (validator.py) when fhir_resource="Patient".
# Layers run schema -> format -> reference -> business -> semantic. birth_date is never
# coerced (partial dates are FHIR-valid and kept), patient_id is never repaired, and PHI
# values are masked in the audit trail by default.

domain: healthcare
version: "0.1.0"
schema_version: "fhir-r4-patient"

rules:
  - id: HC-P001
    name: patient_id present and non-null
    layer: schema
    severity: error
    field: patient_id
    check: not_null
    repair: none

  - id: HC-P002
    name: birth_date and gender present and non-null
    layer: schema
    severity: error
    fields: [birth_date, gender]
    check: not_null
    repair: none

  - id: HC-P003
    name: birth_date is a valid ISO 8601 date (full or FHIR partial)
    layer: format
    severity: error
    field: birth_date
    check: custom
    params:
      func: fhir_date
    repair: flag_only

  - id: HC-P003I
    name: birth_date is a partial date (reduced precision retained, not coerced)
    layer: format
    severity: info
    field: birth_date
    check: custom
    params:
      func: partial_date
    repair: flag_only

  - id: HC-P004
    name: birth_date is not in the future
    layer: format
    severity: error
    field: birth_date
    check: custom
    params:
      func: not_future_date
    repair: flag_only

  - id: HC-P005
    name: gender is a FHIR administrative gender code (case coerced)
    layer: reference
    severity: error
    field: gender
    check: custom
    params:
      func: gender_canonical
    repair: coerce
    repair_params:
      func: coerce_gender_case

  - id: HC-P006
    name: deceased_date is on or after birth_date when deceased
    layer: business
    severity: error
    fields: [deceased_date, birth_date]
    check: custom
    params:
      func: deceased_after_birth
    repair: flag_only

  - id: HC-P007
    name: deceased_date is not in the future
    layer: business
    severity: error
    field: deceased_date
    check: custom
    params:
      func: not_future_date
    repair: flag_only

  - id: HC-P008
    name: address_country is a valid ISO 3166-1 alpha-2 code
    layer: reference
    severity: error
    field: address_country
    check: reference
    params:
      reference: iso3166
      case_insensitive: true
    repair: flag_only

  - id: HC-P009
    name: age derived from birth_date is between 0 and 150 years
    layer: semantic
    severity: warning
    field: birth_date
    check: custom
    params:
      func: age_range
    repair: flag_only
