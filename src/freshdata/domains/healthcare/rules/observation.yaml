# freshdata healthcare pack — FHIR Observation resource rules.
#
# Interpreted by HealthcareValidator (validator.py) when fhir_resource="Observation".
# code_system / code_value recognition is advisory (warning): the bundled LOINC subset is
# not exhaustive, so an unknown code is surfaced, not rejected.

domain: healthcare
version: "0.1.0"
schema_version: "fhir-r4-observation"

rules:
  - id: HC-O001
    name: observation_id, patient_id, status, code_value present and non-null
    layer: schema
    severity: error
    fields: [observation_id, patient_id, status, code_value]
    check: not_null
    repair: none

  - id: HC-O002
    name: status is a valid FHIR Observation status
    layer: reference
    severity: error
    field: status
    check: reference
    params:
      reference: fhir_obs_status
    repair: flag_only

  - id: HC-O003
    name: code_system is a recognized coding system
    layer: reference
    severity: warning
    field: code_system
    check: enum
    params:
      values:
        - http://loinc.org
        - http://snomed.info/sct
        - http://hl7.org/fhir/sid/icd-10
    repair: flag_only

  - id: HC-O004
    name: LOINC code_value appears in the curated LOINC list
    layer: reference
    severity: warning
    field: code_value
    check: custom
    params:
      func: loinc_when_loinc
    repair: flag_only

  - id: HC-O005
    name: effective_date is a parseable ISO 8601 date/datetime
    layer: format
    severity: error
    field: effective_date
    check: custom
    params:
      func: iso8601_datetime
    repair: flag_only

  - id: HC-O008
    name: value_quantity is numeric and non-negative
    layer: format
    severity: error
    field: value_quantity
    check: custom
    params:
      func: nonneg_number
    repair: flag_only

  - id: HC-O006
    name: at least one of value_quantity or value_string is present
    layer: business
    severity: warning
    field: value_quantity
    check: custom
    params:
      func: at_least_one
      others: [value_string]
    repair: flag_only

  - id: HC-O007
    name: value_unit present when value_quantity is present
    layer: business
    severity: error
    field: value_quantity
    check: custom
    params:
      func: requires_field
      requires: value_unit
    repair: flag_only

  - id: HC-O009
    name: interpretation is a FHIR observation interpretation code
    layer: reference
    severity: error
    field: interpretation
    check: enum
    params:
      values: [H, L, N, A, AA, HH, LL, U, R, S, I]
    repair: flag_only
