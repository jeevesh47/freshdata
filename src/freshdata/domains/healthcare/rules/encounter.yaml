# freshdata healthcare pack — FHIR Encounter resource rules.
#
# Interpreted by HealthcareValidator (validator.py) when fhir_resource="Encounter".
# Period checks are status-aware: future periods and >= 1-year durations are only
# surfaced for finished encounters.

domain: healthcare
version: "0.1.0"
schema_version: "fhir-r4-encounter"

rules:
  - id: HC-E001
    name: encounter_id, patient_id, status present and non-null
    layer: schema
    severity: error
    fields: [encounter_id, patient_id, status]
    check: not_null
    repair: none

  - id: HC-E002
    name: status is a valid FHIR Encounter status
    layer: reference
    severity: error
    field: status
    check: reference
    params:
      reference: fhir_enc_status
    repair: flag_only

  - id: HC-E003
    name: class_code is a valid FHIR v3 ActEncounterCode
    layer: reference
    severity: error
    field: class_code
    check: enum
    params:
      values: [AMB, EMER, FLD, HH, IMP, ACUTE, NONAC, OBSENC, PRENC, SS, VR]
    repair: flag_only

  - id: HC-E004
    name: period_start and period_end are parseable ISO 8601 datetimes
    layer: format
    severity: error
    fields: [period_start, period_end]
    check: custom
    params:
      func: iso8601_datetime
    repair: flag_only

  - id: HC-E005
    name: period_end is on or after period_start
    layer: business
    severity: error
    fields: [period_end, period_start]
    check: custom
    params:
      func: ge_date
    repair: flag_only

  - id: HC-E006
    name: period dates are not in the future when status is finished
    layer: business
    severity: error
    fields: [period_start, period_end]
    check: custom
    params:
      func: not_future_when_finished
    repair: flag_only

  - id: HC-E007
    name: reason_code_system is a recognized coding system
    layer: reference
    severity: warning
    field: reason_code_system
    check: enum
    params:
      values:
        - http://loinc.org
        - http://snomed.info/sct
        - http://hl7.org/fhir/sid/icd-10
    repair: flag_only

  - id: HC-E008
    name: finished encounter duration is under 365 days
    layer: semantic
    severity: warning
    fields: [period_start, period_end]
    check: custom
    params:
      func: duration_lt_when_finished
    repair: flag_only
