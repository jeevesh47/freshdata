# freshdata media (EIDR / DDEX) domain pack — validation rules.
#
# Interpreted by MediaValidator (validator.py). A single file holds both sub-schemas;
# every rule is tagged with `params.media_type` (content | release) and MediaValidator
# skips rules tagged for the inactive sub-schema (the same mechanism the transport pack
# uses for per-file GTFS rules). Layers run schema -> format -> reference -> business ->
# semantic. All repairs are flag_only — ids and check-digit fields are never mutated.

domain: media
version: "0.1.0"
schema_version: "eidr-ddex-2024"

rules:
  # ---- content (EIDR) -------------------------------------------------
  - id: MD-C001
    name: eidr_id present and non-null
    layer: schema
    severity: error
    field: eidr_id
    check: not_null
    params: {media_type: content}
    repair: none

  - id: MD-C002
    name: eidr_id is a valid EIDR DOI with a correct check character
    layer: format
    severity: error
    field: eidr_id
    check: custom
    params: {media_type: content, func: eidr_valid}
    repair: flag_only

  - id: MD-C003
    name: content_type is a valid EIDR content type
    layer: reference
    severity: error
    field: content_type
    check: reference
    params: {media_type: content, reference: eidr_content_types}
    repair: flag_only

  - id: MD-C004
    name: release_date is a valid ISO 8601 date (full or partial)
    layer: format
    severity: error
    field: release_date
    check: custom
    params: {media_type: content, func: iso_or_partial_date}
    repair: flag_only

  - id: MD-C005
    name: country_of_origin is a valid ISO 3166-1 alpha-2 code
    layer: reference
    severity: error
    field: country_of_origin
    check: reference
    params: {media_type: content, reference: iso3166, case_insensitive: true}
    repair: flag_only

  - id: MD-C006
    name: language is a valid ISO 639-1 code
    layer: reference
    severity: error
    field: language
    check: reference
    params: {media_type: content, reference: iso639_languages}
    repair: flag_only

  - id: MD-C007
    name: runtime_seconds is a positive integer
    layer: format
    severity: error
    field: runtime_seconds
    check: custom
    params: {media_type: content, func: positive_integer}
    repair: flag_only

  - id: MD-C008
    name: runtime_seconds is under 24 hours
    layer: semantic
    severity: warning
    field: runtime_seconds
    check: range
    params: {media_type: content, max: 86400}
    repair: flag_only

  - id: MD-C009
    name: Episode content has a series_eidr_id
    layer: business
    severity: error
    field: content_type
    check: custom
    params:
      media_type: content
      func: requires_when_value
      equals: Episode
      requires: series_eidr_id
      case_insensitive: true
    repair: flag_only

  - id: MD-C010
    name: series_eidr_id is a valid EIDR DOI when present
    layer: business
    severity: error
    field: series_eidr_id
    check: custom
    params: {media_type: content, func: eidr_valid}
    repair: flag_only

  - id: MD-C011
    name: season_number and episode_number are positive integers
    layer: business
    severity: error
    check: custom
    params:
      media_type: content
      func: positive_int_fields
      targets: [season_number, episode_number]
    repair: flag_only

  - id: MD-C012
    name: episode_number requires a season_number
    layer: business
    severity: error
    field: episode_number
    check: custom
    params: {media_type: content, func: requires_field, requires: season_number}
    repair: flag_only

  - id: MD-C013
    name: Movie/Short content has no season or episode number
    layer: business
    severity: warning
    field: content_type
    check: custom
    params: {media_type: content, func: movie_no_episode}
    repair: flag_only

  # ---- release (DDEX) -------------------------------------------------
  - id: MD-R001
    name: release_id present and non-null
    layer: schema
    severity: error
    field: release_id
    check: not_null
    params: {media_type: release}
    repair: none

  - id: MD-R002
    name: icpn is a valid 12-digit UPC or 13-digit EAN
    layer: format
    severity: error
    field: icpn
    check: custom
    params: {media_type: release, func: icpn_valid}
    repair: flag_only

  - id: MD-R003
    name: release_type is a valid DDEX ReleaseType
    layer: reference
    severity: error
    field: release_type
    check: reference
    params: {media_type: release, reference: ddex_release_types}
    repair: flag_only

  - id: MD-R004
    name: language is a valid ISO 639-1 code
    layer: reference
    severity: error
    field: language
    check: reference
    params: {media_type: release, reference: iso639_languages}
    repair: flag_only

  - id: MD-R005
    name: party_role is a valid DDEX PartyRole
    layer: reference
    severity: error
    field: party_role
    check: reference
    params: {media_type: release, reference: ddex_party_roles}
    repair: flag_only

  - id: MD-R006
    name: territory is a valid ISO 3166-1 code or Worldwide
    layer: reference
    severity: error
    field: territory
    check: reference
    params: {media_type: release, reference: territory_codes, case_insensitive: true}
    repair: flag_only

  - id: MD-R007
    name: release_date is a valid ISO 8601 date
    layer: format
    severity: error
    field: release_date
    check: custom
    params: {media_type: release, func: iso8601_date}
    repair: flag_only

  - id: MD-R008
    name: track_count is a positive integer
    layer: format
    severity: error
    field: track_count
    check: custom
    params: {media_type: release, func: positive_integer}
    repair: flag_only

  - id: MD-R009
    name: track_count is not implausibly large
    layer: semantic
    severity: warning
    field: track_count
    check: range
    params: {media_type: release, max: 500}
    repair: flag_only

  - id: MD-R010
    name: party_role requires a party_id
    layer: business
    severity: error
    field: party_role
    check: custom
    params: {media_type: release, func: requires_field, requires: party_id}
    repair: flag_only

  - id: MD-R011
    name: a Single release has between 1 and 3 tracks
    layer: business
    severity: warning
    field: track_count
    check: custom
    params: {media_type: release, func: single_track_count}
    repair: flag_only
