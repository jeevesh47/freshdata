# freshdata agriculture (ADAPT) domain pack — validation rules.
#
# Interpreted by AgricultureValidator (validator.py); field names are canonical and
# mapped onto real columns. Layers run schema -> format -> reference -> business ->
# semantic. The only active repairs are area_unit / yield_unit coercions (informal
# spellings -> canonical UN/CEFACT codes); field/equipment/operator ids and crop_code
# are never imputed or inferred.

domain: agriculture
version: "0.1.0"
schema_version: "adapt-2024"

rules:
  - id: AG-001
    name: field_id present and non-null
    layer: schema
    severity: error
    field: field_id
    check: not_null
    repair: none

  - id: AG-002
    name: operation_date is ISO 8601 (YYYY-MM-DD)
    layer: format
    severity: error
    field: operation_date
    check: custom
    params:
      func: iso8601_date
    repair: flag_only

  - id: AG-003
    name: operation_date is not in the future
    layer: format
    severity: error
    field: operation_date
    check: custom
    params:
      func: not_future_date
    repair: flag_only

  - id: AG-004
    name: operation_type is a valid ADAPT OperationType
    layer: reference
    severity: error
    field: operation_type
    check: reference
    params:
      reference: operation_types
      case_insensitive: true
    repair: flag_only

  - id: AG-005
    name: crop_code is a recognized FAO crop code
    layer: reference
    severity: warning
    field: crop_code
    check: reference
    params:
      reference: fao_crop_codes
    repair: flag_only

  - id: AG-006
    name: area is a positive number
    layer: format
    severity: error
    field: area
    check: custom
    params:
      func: positive
    repair: flag_only

  - id: AG-007
    name: area_unit is a valid UN/CEFACT area code
    layer: reference
    severity: error
    field: area_unit
    check: reference
    params:
      reference: area_units
    repair: coerce
    repair_params:
      func: coerce_unit
      reference: area_units

  - id: AG-008
    name: area and area_unit are present together
    layer: business
    severity: error
    fields: [area, area_unit]
    check: custom
    params:
      func: both_present
    repair: flag_only

  - id: AG-009
    name: yield_value is a positive number
    layer: format
    severity: error
    field: yield_value
    check: custom
    params:
      func: positive
    repair: flag_only

  - id: AG-010
    name: yield_unit is a valid UN/CEFACT mass/yield code
    layer: reference
    severity: error
    field: yield_unit
    check: reference
    params:
      reference: yield_units
    repair: coerce
    repair_params:
      func: coerce_unit
      reference: yield_units

  - id: AG-011
    name: yield_value and yield_unit are present together
    layer: business
    severity: error
    fields: [yield_value, yield_unit]
    check: custom
    params:
      func: both_present
    repair: flag_only

  - id: AG-012
    name: yield_value only present on a Harvesting operation
    layer: business
    severity: warning
    field: yield_value
    check: custom
    params:
      func: yield_only_when_harvest
    repair: flag_only

  - id: AG-013
    name: soil_texture_class is a valid USDA texture class
    layer: reference
    severity: error
    field: soil_texture_class
    check: reference
    params:
      reference: soil_texture_classes
      case_insensitive: true
    repair: flag_only

  - id: AG-014
    name: soil_ph is numeric within 0.0-14.0
    layer: format
    severity: error
    field: soil_ph
    check: range
    params:
      min: 0.0
      max: 14.0
    repair: flag_only

  - id: AG-015
    name: soil_ph is agronomically plausible (3.5-9.5)
    layer: semantic
    severity: warning
    field: soil_ph
    check: range
    params:
      min: 3.5
      max: 9.5
    repair: flag_only

  - id: AG-016
    name: soil_om_pct is numeric within 0.0-100.0
    layer: format
    severity: error
    field: soil_om_pct
    check: range
    params:
      min: 0.0
      max: 100.0
    repair: flag_only

  - id: AG-017
    name: soil_om_pct is plausible for mineral soils (<= 20)
    layer: semantic
    severity: warning
    field: soil_om_pct
    check: range
    params:
      max: 20
    repair: flag_only

  - id: AG-018
    name: season_year is a 4-digit year (1900..current+1)
    layer: format
    severity: error
    field: season_year
    check: custom
    params:
      func: season_year_valid
    repair: flag_only

  - id: AG-019
    name: operation_date year matches season_year
    layer: business
    severity: warning
    fields: [operation_date, season_year]
    check: custom
    params:
      func: date_year_matches_season
    repair: flag_only
