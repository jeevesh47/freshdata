name: Release

# Publish freshdata-cleaner to PyPI when a version tag is pushed (e.g. v0.5.0),
# or manually via the Actions tab.
#
# Authentication uses PyPI Trusted Publishing (OIDC). Configure a trusted
# publisher on PyPI for this repository/workflow/environment.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # mypy targets Python 3.10; NumPy 2.5+ stubs require Python 3.12.
          pip install -e ".[dev,ml,docs]" "numpy<2.5"
      - name: Lint
        run: ruff check src tests
      - name: Typecheck
        run: mypy src/freshdata
      - name: Test (release fast lane)
        run: pytest -m "not online and not large"
      - name: Docs strict
        run: mkdocs build --strict

  build:
    name: Build distributions
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/freshdata-cleaner/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
