name: Release

# Publish freshdata-cleaner to PyPI when a version tag is pushed (e.g. v0.5.0),
# or manually via the Actions tab.
#
# Authentication uses an API token stored in the repository secret
# PYPI_API_TOKEN (a PyPI project/account token, username __token__). `skip-existing`
# makes a re-run on an already-published version a no-op success. To switch to PyPI
# Trusted Publishing instead, configure a trusted publisher on the project and replace
# the `password:` line with `permissions: id-token: write`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/freshdata-cleaner/
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
